
# Create a workflow that reads questforge.yaml and configures everything
workflow_auto_setup = '''name: Auto-Setup QuestForge from YAML

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  setup-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read questforge.yaml
        id: config
        uses: pietrobolcato/action-read-yaml@1.0.0
        with:
          config: ${{ github.workspace }}/questforge.yaml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create .env from YAML
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ steps.config.outputs['supabase_url'] }}" >> .env.local
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ steps.config.outputs['supabase_anon_key'] }}" >> .env.local
          cat .env.local

      - name: Build QuestForge
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.config.outputs['supabase_url'] }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.config.outputs['supabase_anon_key'] }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment deployment URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 QuestForge deployed! Visit: https://${{ steps.config.outputs['github_username'] }}.github.io/${{ steps.config.outputs['github_repository'] }}'
            })
'''

with open(f"{base_path}/.github/workflows/auto-setup.yml", "w") as f:
    f.write(workflow_auto_setup)

