name: QuestForge - Populate Repository

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'API Version'
        default: '1.0'
        required: true
      supabase_url:
        description: 'Supabase URL'
        required: true
      environment:
        description: 'Environment'
        default: 'development'
        required: true

jobs:
  populate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create QuestForge configuration
        run: |
          mkdir -p config
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > config/questforge.json << EOF
          {
            "version": "${{ github.event.inputs.version || '1.0' }}",
            "created_at": "$TIMESTAMP",
            "repository": "${{ github.repository }}"
          }
          EOF

      - name: Create Supabase configuration
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          mkdir -p config
          cat > config/supabase.json << EOF
          {
            "url": "${{ github.event.inputs.supabase_url || env.SUPABASE_URL }}",
            "environment": "${{ github.event.inputs.environment || 'development' }}"
          }
          EOF

      - name: Create GitHub integration config
        run: |
          mkdir -p config
          cat > config/github.json << EOF
          {
            "token_ref": "GITHUB_TOKEN",
            "repository": "${{ github.repository }}",
            "workflow": "questforge.yaml"
          }
          EOF

      - name: Create App manifest
        run: |
          mkdir -p config
          cat > config/app.json << EOF
          {
            "name": "QuestForge",
            "type": "gamified-project-platform",
            "features": [
              "project-management",
              "submissions",
              "secret-sharing",
              "organization"
            ]
          }
          EOF

      - name: Create Gamification config
        run: |
          mkdir -p config
          cat > config/gamification.json << EOF
          {
            "enabled": true,
            "systems": [
              "achievements",
              "leaderboards",
              "challenges",
              "rewards"
            ],
            "integrations": {
              "projects": true,
              "submissions": true,
              "secrets": true
            }
          }
          EOF

      - name: Commit and push generated files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add config/
          git diff --staged --quiet || git commit -m "chore: populate QuestForge configuration [skip ci]"
          git push
